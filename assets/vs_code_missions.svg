<svg width="550" height="424" viewBox="0 0 550 424" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;family=Inter:wght@400;500&amp;display=swap');
      .bg { fill: #1e1e1e; }
      .mac-btn-red { fill: #ff5f56; }
      .mac-btn-yellow { fill: #ffbd2e; }
      .mac-btn-green { fill: #27c93f; }
      .top-bar { fill: #2d2d2d; }
      .title { font-family: 'Inter', sans-serif; font-size: 13px; fill: #858585; text-anchor: middle; }
      .line-num { font-family: 'Fira Code', monospace; font-size: 14px; fill: #858585; user-select: none; }
      .code { font-family: 'Fira Code', monospace; font-size: 14px; }
      
      /* Syntax Highlighting */
      .sy-keyword { fill: #569cd6; }  /* blue */
      .sy-string { fill: #ce9178; }   /* orange/red */
      .sy-key { fill: #9cdcfe; }      /* light blue */
      .sy-comment { fill: #6a9955; }  /* green */
      .sy-operator { fill: #d4d4d4; } /* white-ish */
      .sy-number { fill: #b5cea8; }   /* light green */
      
      .cursor { fill: #cccccc; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      
      /* Subtle drop shadow to make it realistic */
      .shadow { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
    </style>
  </defs>

  <g class="shadow">
    <!-- Window Background -->
    <rect class="bg" width="550" height="424" rx="10" />
    
    <!-- Top Bar -->
