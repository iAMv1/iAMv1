<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap');
      
      :root {
        --bg-color: #0b132b;
        --fg-color: #ffffff;
        --ac-color: #ef233c;
      }
      
      @media (prefers-color-scheme: light) {
        :root {
          --bg-color: #f8fafc;
          --fg-color: #0f172a;
          --ac-color: #ef233c;
        }
      }
      
      .st-bg { fill: transparent; }
      .st-stroke { stroke: var(--fg-color); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .st-poly { stroke: var(--ac-color); fill: var(--ac-color); fill-opacity: 0.15; stroke-width: 2; stroke-linejoin: round; }
      .st-fill { fill: var(--fg-color); }
      .st-accent { fill: var(--ac-color); }
      
      .st-text { font-family: 'Space Mono', monospace; fill: var(--fg-color); font-size: 14px; font-weight: 700; }
      .st-text-small { font-family: 'Space Mono', monospace; fill: var(--fg-color); font-size: 10px; font-weight: 700; letter-spacing: 1px; }
      .st-dim { stroke-opacity: 0.3; }
      
      @keyframes radar-pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
      .st-animate-poly { transform-origin: 200px 125px; animation: radar-pulse 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="400" height="250" class="st-bg" />
  
  <!-- Outer Box -->
  <rect x="10" y="10" width="380" height="230" class="st-stroke" rx="10" />
  
  <!-- Title -->
  <text x="20" y="35" class="st-text">SYSTEM.CAPABILITIES()</text>
  <line x1="20" y1="45" x2="380" y2="45" class="st-stroke" />

  <!-- Radar Grid Background Concentric Circles -->
  <circle cx="200" cy="125" r="20" class="st-stroke st-dim" stroke-dasharray="2 4" />
  <circle cx="200" cy="125" r="50" class="st-stroke st-dim" stroke-dasharray="2 4" />
  <circle cx="200" cy="125" r="80" class="st-stroke st-dim" />

  <!-- Radar Axes -->
  <line x1="200" y1="125" x2="200.0" y2="45.0" class="st-stroke st-dim" /><line x1="200" y1="125" x2="269.28203230275506" y2="85.0" class="st-stroke st-dim" /><line x1="200" y1="125" x2="269.2820323027551" y2="165.0" class="st-stroke st-dim" /><line x1="200" y1="125" x2="200.0" y2="205.0" class="st-stroke st-dim" /><line x1="200" y1="125" x2="130.71796769724492" y2="165.00000000000003" class="st-stroke st-dim" /><line x1="200" y1="125" x2="130.7179676972449" y2="85.00000000000006" class="st-stroke st-dim" />

  <!-- Data Polygon -->
  <polygon points="200.0,49.0 258.88972745734185,91.0 262.3538290724796,161.0 200.0,173.0 132.10360834330004,164.20000000000005 186.14359353944897,117.00000000000001" class="st-poly st-animate-poly" />
  
  <!-- Vertices Dots -->
  <circle cx="200.0" cy="49.0" r="3" class="st-accent st-animate-poly" />
  <circle cx="258.88972745734185" cy="91.0" r="3" class="st-accent st-animate-poly" />
  <circle cx="262.3538290724796" cy="161.0" r="3" class="st-accent st-animate-poly" />
  <circle cx="200.0" cy="173.0" r="3" class="st-accent st-animate-poly" />
  <circle cx="132.10360834330004" cy="164.20000000000005" r="3" class="st-accent st-animate-poly" />
  <circle cx="186.14359353944897" cy="117.00000000000001" r="3" class="st-accent st-animate-poly" />
  
  <!-- Labels -->
  <text x="200.0" y="24.0" text-anchor="middle" class="st-text-small">PYTHON</text><text x="290.93266739736606" y="76.5" text-anchor="start" class="st-text-small">REACT/3D</text><text x="290.93266739736606" y="181.5" text-anchor="start" class="st-text-small">AI/Agents</text><text x="200.0" y="234.0" text-anchor="middle" class="st-text-small">DEVOPS</text><text x="109.06733260263395" y="181.50000000000003" text-anchor="end" class="st-text-small">CSS/VIBES</text><text x="109.0673326026339" y="76.50000000000007" text-anchor="end" class="st-text-small">RUST</text>

  <!-- Crosshair Accents -->
  <line x1="10" y1="125" x2="30" y2="125" class="st-stroke" />
  <line x1="370" y1="125" x2="390" y2="125" class="st-stroke" />
  <line x1="200" y1="10" x2="200" y2="30" class="st-stroke" />
  <line x1="200" y1="220" x2="200" y2="240" class="st-stroke" />

</svg>