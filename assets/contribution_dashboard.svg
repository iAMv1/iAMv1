<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');

      .st-bg { fill: #0f172a; }
      .st-stroke { stroke: #f8fafc; fill: none; stroke-width: 2; }
      .st-border { fill: none; stroke: #334155; stroke-width: 1.5; }
      .st-poly { stroke: #38bdf8; fill: #38bdf8; fill-opacity: 0.3; stroke-width: 2; stroke-linejoin: round; }
      .st-fill { fill: #f8fafc; }
      .st-accent { fill: #38bdf8; }

      .st-text { font-family: 'Outfit', sans-serif; fill: #f8fafc; font-size: 16px; font-weight: 700; letter-spacing: 1px;}
      .st-text-small { font-family: 'Fira Code', monospace; fill: #f8fafc; font-size: 11px; font-weight: 600; letter-spacing: 1px; }
      .st-dim { stroke-opacity: 0.4; }

      @keyframes radar-pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
      .st-animate-poly { transform-origin: 210px 210px; animation: radar-pulse 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="420" height="420" rx="16" class="st-bg" />
  <rect x="1" y="1" width="418" height="418" rx="16" class="st-border" />
  
  <!-- Title -->
  <text x="20" y="35" class="st-text">SYSTEM.CAPABILITIES()</text>
  <line x1="20" y1="45" x2="380" y2="45" class="st-stroke" />

  <!-- Radar Grid Background Concentric Circles -->
  <circle cx="210" cy="210" r="20" class="st-stroke st-dim" stroke-dasharray="2 4" />
  <circle cx="210" cy="210" r="50" class="st-stroke st-dim" stroke-dasharray="2 4" />
  <circle cx="210" cy="210" r="80" class="st-stroke st-dim" />

  <!-- Radar Axes -->
  <line x1="210" y1="210" x2="210.0" y2="100.0" class="st-stroke st-dim" /><line x1="210" y1="210" x2="305.2627944162882" y2="155.0" class="st-stroke st-dim" /><line x1="210" y1="210" x2="305.2627944162883" y2="265.0" class="st-stroke st-dim" /><line x1="210" y1="210" x2="210.0" y2="320.0" class="st-stroke st-dim" /><line x1="210" y1="210" x2="114.73720558371177" y2="265.00000000000006" class="st-stroke st-dim" /><line x1="210" y1="210" x2="114.7372055837117" y2="155.00000000000006" class="st-stroke st-dim" />

  <!-- Data Polygon -->
  <polygon points="210.0,105.5 257.3896118644004,182.63959483329654 237.01291275913098,225.59591245308013 210.0,232.0 190.94744111674237,221.0 190.94744111674234,199.0" class="st-poly st-animate-poly" />
  
  <!-- Vertices Dots -->
  <circle cx="210.0" cy="105.5" r="3" class="st-accent st-animate-poly" />
  <circle cx="257.3896118644004" cy="182.63959483329654" r="3" class="st-accent st-animate-poly" />
  <circle cx="237.01291275913098" cy="225.59591245308013" r="3" class="st-accent st-animate-poly" />
  <circle cx="210.0" cy="232.0" r="3" class="st-accent st-animate-poly" />
  <circle cx="190.94744111674237" cy="221.0" r="3" class="st-accent st-animate-poly" />
  <circle cx="190.94744111674234" cy="199.0" r="3" class="st-accent st-animate-poly" />
  
  <!-- Labels -->
  <text x="210.0" y="64.0" text-anchor="middle" class="st-text-small">PYTHON</text><text x="339.9038105676658" y="139.0" text-anchor="start" class="st-text-small">TYPESCRIPT</text><text x="339.9038105676658" y="289.0" text-anchor="start" class="st-text-small">PYTHON (AI</text><text x="210.0" y="364.0" text-anchor="middle" class="st-text-small">JAVASCRIPT</text><text x="80.09618943233423" y="289.00000000000006" text-anchor="end" class="st-text-small">UI/VIBES</text><text x="80.09618943233414" y="139.0000000000001" text-anchor="end" class="st-text-small">PLPGSQL</text>

  <!-- Crosshair Accents -->
  <line x1="10" y1="125" x2="30" y2="125" class="st-stroke" />
  <line x1="370" y1="125" x2="390" y2="125" class="st-stroke" />
  <line x1="200" y1="10" x2="200" y2="30" class="st-stroke" />
  <line x1="200" y1="220" x2="200" y2="240" class="st-stroke" />

</svg>