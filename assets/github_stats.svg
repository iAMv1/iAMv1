<svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');

      .bg { fill: #0f172a; }
      .border-box { fill: none; stroke: #334155; stroke-width: 1.5; }
      .stat-card { fill: #1e293b; stroke: #334155; stroke-width: 1; }
      .stat-value {
        font-family: 'Outfit', sans-serif;
        font-size: 22px;
        font-weight: 900;
        fill: #f8fafc;
        letter-spacing: 0.5px;
      }
      .stat-label {
        font-family: 'Fira Code', monospace;
        font-size: 10px;
        font-weight: 500;
        fill: #f8fafc;
        opacity: 0.6;
        letter-spacing: 1px;
      }
      .title {
        font-family: 'Outfit', sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #f8fafc;
        letter-spacing: 1px;
      }
      .subtitle {
        font-family: 'Fira Code', monospace;
        font-size: 10px;
        fill: #f8fafc;
        opacity: 0.4;
      }
      .label {
        font-family: 'Fira Code', monospace;
        font-size: 10px;
        fill: #f8fafc;
        opacity: 0.7;
      }
      .section-title {
        font-family: 'Outfit', sans-serif;
        font-size: 12px;
        font-weight: 700;
        fill: #38bdf8;
        letter-spacing: 2px;
      }
      .divider { stroke: #334155; stroke-width: 1; stroke-dasharray: 4 4; }
      .accent-dot { fill: #38bdf8; }

      @keyframes glow-pulse {
        0%, 100% { r: 4; opacity: 1; }
        50% { r: 7; opacity: 0.5; }
      }
      .pulse { animation: glow-pulse 2s ease-in-out infinite; }

      @keyframes scan {
        0% { transform: translateY(0); }
        100% { transform: translateY(380px); }
      }
      .scanline {
        fill: #38bdf8;
        opacity: 0.03;
        animation: scan 4s linear infinite;
      }
    </style>

    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="420" rx="16" class="bg" />
  <rect x="1" y="1" width="418" height="418" rx="16" class="border-box" />

  <!-- Scanline effect -->
  <rect x="0" y="0" width="420" height="4" rx="2" class="scanline" />

  <!-- Header -->
  <rect x="1" y="1" width="418" height="60" rx="16" fill="url(#headerGrad)" />
  <circle cx="20" cy="30" r="4" class="accent-dot pulse" />
  <text x="36" y="26" class="title">IAMV1</text>
  <text x="36" y="42" class="subtitle">LIVE SYSTEM TELEMETRY</text>
  <text x="400" y="36" class="subtitle" text-anchor="end">2026-03-12 01:55 UTC</text>

  <!-- Divider -->
  <line x1="20" y1="65" x2="400" y2="65" class="divider" />

  <!-- Section: Core Stats -->
  <text x="30" y="90" class="section-title">▸ CORE METRICS</text>
  
        <g transform="translate(30, 100)">
          <rect width="120" height="65" rx="10" class="stat-card">
            <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0.1s" />
          </rect>
          <text x="60" y="28" class="stat-value" text-anchor="middle">1</text>
          <text x="60" y="48" class="stat-label" text-anchor="middle">⭐ Stars</text>
        </g>
        <g transform="translate(160, 100)">
          <rect width="120" height="65" rx="10" class="stat-card">
            <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0.2s" />
          </rect>
          <text x="60" y="28" class="stat-value" text-anchor="middle">131</text>
          <text x="60" y="48" class="stat-label" text-anchor="middle">🔥 Commits</text>
        </g>
        <g transform="translate(290, 100)">
          <rect width="120" height="65" rx="10" class="stat-card">
            <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0.30000000000000004s" />
          </rect>
          <text x="60" y="28" class="stat-value" text-anchor="middle">12</text>
          <text x="60" y="48" class="stat-label" text-anchor="middle">📦 Repos</text>
        </g>
        <g transform="translate(30, 180)">
          <rect width="120" height="65" rx="10" class="stat-card">
            <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0.4s" />
          </rect>
          <text x="60" y="28" class="stat-value" text-anchor="middle">8</text>
          <text x="60" y="48" class="stat-label" text-anchor="middle">🔀 PRs</text>
        </g>
        <g transform="translate(160, 180)">
          <rect width="120" height="65" rx="10" class="stat-card">
            <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0.5s" />
          </rect>
          <text x="60" y="28" class="stat-value" text-anchor="middle">153</text>
          <text x="60" y="48" class="stat-label" text-anchor="middle">⚡ Contrib</text>
        </g>
        <g transform="translate(290, 180)">
          <rect width="120" height="65" rx="10" class="stat-card">
            <animate attributeName="opacity" from="0" to="1" dur="0.6s" fill="freeze" begin="0.6s" />
          </rect>
          <text x="60" y="28" class="stat-value" text-anchor="middle">0d</text>
          <text x="60" y="48" class="stat-label" text-anchor="middle">🏏 Streak</text>
        </g>

  <!-- Divider -->
  <line x1="20" y1="245" x2="400" y2="245" class="divider" />

  <!-- Section: Languages -->
  <text x="30" y="258" class="section-title">▸ LANGUAGE PROFILE</text>
  <rect x="30" y="262" width="180.54000000000002" height="14" rx="3" fill="#3572A5" opacity="0.85"><animate attributeName="width" from="0" to="180.54000000000002" dur="1.2s" fill="freeze" begin="0.3s" /></rect>
<text x="218.54000000000002" y="274" class="label">Python (53.1%)</text>
<rect x="30" y="284" width="93.50000000000001" height="14" rx="3" fill="#3178c6" opacity="0.85"><animate attributeName="width" from="0" to="93.50000000000001" dur="1.2s" fill="freeze" begin="0.44999999999999996s" /></rect>
<text x="131.5" y="296" class="label">TypeScript (27.5%)</text>
<rect x="30" y="306" width="53.38" height="14" rx="3" fill="#DA5B0B" opacity="0.85"><animate attributeName="width" from="0" to="53.38" dur="1.2s" fill="freeze" begin="0.6s" /></rect>
<text x="91.38" y="318" class="label">Jupyter Notebook (15.7%)</text>
<rect x="30" y="328" width="8.16" height="14" rx="3" fill="#f1e05a" opacity="0.85"><animate attributeName="width" from="0" to="8.16" dur="1.2s" fill="freeze" begin="0.75s" /></rect>
<text x="46.16" y="340" class="label">JavaScript (2.4%)</text>
<rect x="30" y="350" width="4.420000000000001" height="14" rx="3" fill="#e34c26" opacity="0.85"><animate attributeName="width" from="0" to="4.420000000000001" dur="1.2s" fill="freeze" begin="0.8999999999999999s" /></rect>
<text x="42.42" y="362" class="label">HTML (1.3%)</text>


  <!-- Bottom accent line -->
  <line x1="30" y1="400" x2="120" y2="400" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <circle cx="126" cy="400" r="3" class="accent-dot" opacity="0.5" />

</svg>