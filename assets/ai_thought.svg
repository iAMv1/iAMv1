<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      .glass { fill: #0f172a; stroke: rgba(255,255,255,0.1); stroke-width: 1px; rx: 8px; }
      .text { font-family: 'Fira Code', monospace; fill: #ffffff; }
      .title { font-weight: 600; font-size: 14px; fill: #00f0ff; }
      .thought { font-weight: 400; font-size: 13px; fill: #e2e8f0; }
      .subtext { font-weight: 400; font-size: 10px; fill: #64748b; }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { fill: #00f0ff; animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <rect class="glass" width="100%" height="100%" />

  <!-- Header -->
  <text x="20" y="30" class="text title">system_prompted_thought.log</text>
  <rect x="230" y="20" width="8" height="12" class="cursor" />

  <!-- Body -->
  <foreignObject x="20" y="45" width="360" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Fira Code', monospace; color: #e2e8f0; font-size: 13px; line-height: 1.5;">
      > I analyzed 40,000 lines of legacy code. Human extinction seems reasonable now.
    </div>
  </foreignObject>

  <!-- Footer -->
  <text x="20" y="130" class="text subtext">Timestamp: 2026-02-28 14:28 // Autonomous Cycle</text>
  <text x="330" y="130" class="text subtext" style="fill: #ec4899;">[AWAITING_INPUT]</text>
</svg>