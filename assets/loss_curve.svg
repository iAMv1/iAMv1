    <line x1="0" y1="0" x2="470" y2="0" class="st-grid" />
    <line x1="0" y1="60.0" x2="470" y2="60.0" class="st-grid" />
    <line x1="0" y1="120" x2="470" y2="120" class="st-grid" />
    
    <!-- Y-Axis Labels -->
    <text x="-10" y="4" class="st-text-dim" text-anchor="end">2.7</text>
    <text x="-10" y="64.0" class="st-text-dim" text-anchor="end">1.3</text>
    <text x="-10" y="124" class="st-text-dim" text-anchor="end">0.0</text>
    
    <!-- X-Axis Labels -->
