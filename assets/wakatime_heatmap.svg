<svg width="480" height="488" viewBox="0 0 480 488" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
      .bg { fill: #0f172a; }
      .border-box { fill: none; stroke: #334155; stroke-width: 1.5; }
      .title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700; fill: #f8fafc; letter-spacing: 1px; }
      .sub { font-family: 'Fira Code', monospace; font-size: 11px; fill: #38bdf8; opacity: 0.8; }
      .hint { font-family: 'Fira Code', monospace; font-size: 10px; fill: #f8fafc; opacity: 0.45; }
    </style>
  </defs>
  <rect width="480" height="488" rx="10" class="bg" />
  <rect x="1" y="1" width="478" height="486" rx="10" class="border-box" />
  <text x="240" y="214" class="title" text-anchor="middle">WAKATIME / CODING ACTIVITY</text>
  <text x="240" y="244" class="sub" text-anchor="middle">⚙ Not Configured</text>
  <text x="240" y="268" class="hint" text-anchor="middle">Add WAKATIME_API_KEY to your repo secrets</text>
  <text x="240" y="286" class="hint" text-anchor="middle">to see real coding activity here.</text>
</svg>