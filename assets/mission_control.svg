<svg width="450" height="290" viewBox="0 0 450 290" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      .text { font-family: 'Fira Code', monospace; fill: #ffffff; }
      .title { font-weight: 600; font-size: 16px; }
      .subtext { font-weight: 400; font-size: 12px; fill: #94a3b8; }
      .glass { fill: #0f172a; stroke: rgba(255,255,255,0.1); stroke-width: 1px; rx: 8px; }
      .bar-bg { fill: rgba(255,255,255,0.05); rx: 4px; }
      
      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
      .terminal-cursor { fill: #39ff14; animation: pulse 1.5s infinite; }
    </style>
  </defs>

  <!-- Background Glass Card -->
  <rect class="glass" width="100%" height="100%" />

  <!-- Header -->
  <rect x="20" y="24" width="12" height="12" class="terminal-cursor" />
  <text x="40" y="34" class="text title">SYSTEM NOMINAL</text>
  <text x="40" y="54" class="text subtext">Last Uplink: 2026-02-28 14:27:35 UTC</text>

  <!-- Mission Wrapper -->
  <g transform="translate(40, 80)">
    <text x="0" y="10" class="text subtext">Engineer Vibes for 3D Portfolio [85%]</text>
    <rect x="0" y="20" width="370" height="10" class="bar-bg" />
    <rect x="0" y="20" width="314.5" height="10" fill="#00f0ff" rx="4" />
  </g>

  <!-- Mission Wrapper -->
  <g transform="translate(40, 150)">
    <text x="0" y="10" class="text subtext">Argue with LangChain Agents [40%]</text>
    <rect x="0" y="20" width="370" height="10" class="bar-bg" />
    <rect x="0" y="20" width="148.0" height="10" fill="#ff003c" rx="4" />
  </g>

  <!-- Mission Wrapper -->
  <g transform="translate(40, 220)">
    <text x="0" y="10" class="text subtext">Figure things out without crying [12%]</text>
    <rect x="0" y="20" width="370" height="10" class="bar-bg" />
    <rect x="0" y="20" width="44.4" height="10" fill="#eab308" rx="4" />
  </g>
</svg>