name: Update AI Neural Dump SVG
on:
  schedule:
    - cron: '0 0 * * *' # Runs at Midnight UTC
  workflow_dispatch:

jobs:
  generate-thought:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate AI Thought
        run: python scripts/generate_ai_thought.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/ai_thought.svg
          git commit -m "[Automated] Update AI Neural Dump SVG" -a || exit 0
          git push
