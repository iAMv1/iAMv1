name: Update Contribution Dashboard SVG
on:
  schedule:
    - cron: '0 0 * * *' # Midnight daily
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate Dashboard
        run: |
          python scripts/generate_wakatime.py
          python scripts/generate_stats.py
          python scripts/generate_dashboard.py
          python scripts/generate_3d_stack.py
          python scripts/generate_cricket_graph.py
          python scripts/build_mission_svg.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/*.svg
          git commit -m "[Automated] Update Profile SVGs" -a || exit 0
          git push
