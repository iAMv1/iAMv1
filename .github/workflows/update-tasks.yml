name: Update Mission Control SVG
on:
  push:
    paths:
      - 'tasks.json'
  workflow_dispatch:

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate SVG
        run: python scripts/build_mission_svg.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/mission_control.svg
          git commit -m "[Automated] Update Mission Control SVG" -a || exit 0
          git push
